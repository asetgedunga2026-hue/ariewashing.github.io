<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cek Status Laundry - Arie Washing</title>
<style>
  body { font-family: Arial, sans-serif; background: #f0f8ff; text-align: center; padding: 30px; }
  .box { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
  h1 { color: #0077b6; }
  input { padding: 10px; width: 80%; border: 2px solid #0077b6; border-radius: 8px; margin-bottom: 10px; }
  button { padding: 10px 20px; background: #0077b6; color: white; border: none; border-radius: 8px; cursor: pointer; }
  button:hover { background: #005f94; }
  #hasil { margin-top: 20px; font-size: 18px; font-weight: bold; }
</style>
</head>
<body>
  <div class="box">
    <h1>🧺 Arie Washing</h1>
    <p>Masukkan Kode Laundry Anda</p>
    <input type="text" id="kode" placeholder="Contoh: AW001">
    <br>
    <button onclick="cekStatus()">Cek Status</button>
    <div id="hasil"></div>
  </div>

<script>
const url = "https://script.google.com/macros/s/AKfycbxPASTE_URL_APPS_SCRIPT_ANDA/exec";

async function cekStatus() {
  const kode = document.getElementById("kode").value.toUpperCase();
  const hasil = document.getElementById("hasil");
  
  if(kode === "") {
    hasil.innerHTML = "Masukkan kode dulu ya!";
    return;
  }
  
  hasil.innerHTML = "Mengecek...";
  
  try {
    const res = await fetch(url + "?kode=" + kode);
    const data = await res.json();
    
    if(data.STATUS) {
      hasil.innerHTML = `KODE: ${kode} <br> STATUS: ${data.STATUS}`;
    } else {
      hasil.innerHTML = "Kode tidak ditemukan";
    }
  } catch(err) {
    hasil.innerHTML = "Error koneksi ke server";
  }
}
</script>
</body>
</html>
