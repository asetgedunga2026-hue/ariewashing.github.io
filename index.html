<!DOCTYPE html>
<html>
<head>
  <title>Cek Status ARIE WASHING</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: Arial; text-align: center; padding: 20px; background: #f0f8ff; }
    h1 { color: #007bff; }
    input { padding: 10px; width: 80%; max-width: 300px; margin: 10px 0; border: 2px solid #007bff; border-radius: 5px; }
    button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
    button:hover { background: #0056b3; }
    #hasil { margin-top: 20px; padding: 15px; background: white; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
  </style>
</head>
<body>

  <h1>ARIE WASHING</h1>
  <p>Masukkan Kode Pelanggan</p>
  
  <input type="text" id="kode" placeholder="Contoh: ARW001">
  <br>
  <button onclick="cekstatus()">Cek Status</button>
  
  <div id="hasil"></div>

<script>
const url = "https://script.google.com/macros/s/AKfycbxaol-WsmkBH4bN6KX9s3o-Vz6GvFhIDPBphWyEqFkpwG8hH-i6hkMg39x-sLybkEgBHw/exec";

async function cekstatus() {
  const kode = document.getElementById("kode").value;
  const hasil = document.getElementById("hasil");
  
  if(kode === "") {
    hasil.innerHTML = "Masukkan kode dulu ya!";
    return;
  }
  
  hasil.innerHTML = "Mengecek...";
  
  try {
    const res = await fetch(url + "?kode=" + kode);
    const data = await res.json();
    hasil.innerHTML = data.status;
  } catch (error) {
    hasil.innerHTML = "Error koneksi. Coba lagi nanti";
  }
}
</script>

</body>
</html>
