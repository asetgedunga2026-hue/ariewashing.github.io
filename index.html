<script>
  let data = {};

  fetch("TEMPEL_LINK_CSV_OM_DISINI")
.then(res => res.text())
.then(csv => {
    const rows = csv.split("\n");
    const headers = rows.shift().split(",");
    const kodeIndex = headers.indexOf("order");
    const statusIndex = headers.indexOf("Status");
    
    rows.forEach(row => {
      const cols = row.split(",");
      data[cols[kodeIndex].trim().toUpperCase()] = cols[statusIndex].trim();
    });
  });

  function cekStatus() {
    const kode = document.getElementById("kode").value.trim().toUpperCase();
    const hasil = document.getElementById("hasil");
    hasil.innerHTML = data? `KODE: ${kode} <br> STATUS: ${data}` : `KODE: ${kode} <br> STATUS: Kode tidak ditemukan`;
    hasil.style.color = data? "green" : "red";
  }
</script>
