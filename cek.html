<!DOCTYPE html>
<html>
<head>
  <title>Cek Status Laundry - Arie Washing</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body{font-family:Arial; text-align:center; padding:50px; background:#f0f8ff;}
    .box{background:white; padding:30px; border-radius:15px; box-shadow:0 4px 10px rgba(0,0,0,0.1); max-width:400px; margin:auto;}
    h1{color:#007bff;}
    .status{font-size:24px; font-weight:bold; color:green; margin-top:20px;}
    .kode{font-size:20px; background:#e9ecef; padding:10px; border-radius:8px; margin:10px 0;}
  </style>
</head>
<body>
  <div class="box">
    <h1>Arie Washing</h1>
    <p>Status Laundry Anda</p>
    <div class="kode" id="kode"></div>
    <div class="status" id="status">STATUS: DITERIMA</div>
    <p style="margin-top:20px; font-size:12px;">Terima kasih sudah menggunakan jasa kami</p>
  </div>
<script>
  const urlParams = new URLSearchParams(window.location.search);
  const kode = urlParams.get('kode');
  document.getElementById("kode").innerText = kode ? kode : "KODE TIDAK DITEMUKAN";
</script>
</body>
</html>
